<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$HORMUZ Presale - The Strait of Power</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #050505; font-family: 'Inter', system-ui, sans-serif; }
    .gold-gradient { background: linear-gradient(90deg, #facc15, #fbbf24, #e5b80b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                        url('https://your-image-link.jpg'); /* ← 替换成你的图片链接 */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
  </style>
</head>
<body class="text-white">

  <!-- Hero Section - 使用你的原图风格 -->
  <section class="hero-bg min-h-screen flex items-center relative">
    <div class="max-w-6xl mx-auto text-center px-6 pt-20 relative z-10">
      <h1 class="text-7xl md:text-[5.5rem] font-bold gold-gradient tracking-widest mb-6 drop-shadow-2xl">HORMUZ</h1>
      <p class="text-4xl font-semibold mb-10 text-white/90">The Strait of Power</p>

      <div class="inline-block bg-red-600/90 backdrop-blur-md text-white px-10 py-3.5 rounded-full text-xl font-bold mb-12 shadow-xl">
        🚨 PRESALE IS OFFICIALLY LIVE 🔥
      </div>

      <!-- Countdown -->
      <div class="mb-12">
        <p class="text-yellow-400 text-xl mb-4 tracking-widest">PRESALE ENDS IN</p>
        <div id="countdown" class="flex justify-center gap-8 text-5xl md:text-6xl font-bold font-mono"></div>
      </div>

      <!-- Progress -->
      <div class="max-w-xl mx-auto mb-12">
        <div class="flex justify-between text-sm mb-3">
          <span class="font-medium">Raised: <span id="raised" class="text-yellow-400">1,428 SOL</span></span>
          <span class="font-medium">2,000 SOL Hard Cap</span>
        </div>
        <div class="h-5 bg-gray-900/80 rounded-full overflow-hidden border border-yellow-500/30">
          <div id="progressBar" class="h-full bg-gradient-to-r from-yellow-400 via-amber-400 to-yellow-500 transition-all" style="width: 71.4%"></div>
        </div>
      </div>

      <button onclick="alert('Phantom / Solflare wallet connection coming soon...')" 
              class="bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-amber-500 hover:to-yellow-400 text-black font-bold text-2xl px-16 py-7 rounded-3xl transition-all hover:scale-105 shadow-2xl">
        Connect Wallet to Buy
      </button>

      <p class="mt-10 text-xl text-white/80">1 SOL = <span class="font-bold text-yellow-300">150,000 $HORMUZ</span></p>
    </div>
  </section>

  <!-- 其他区块（Tokenomics, Roadmap 等）可继续使用之前版本 -->

  <script>
    // 真实倒计时
    function startCountdown() {
      const end = new Date("2026-03-23T12:00:00Z").getTime();
      setInterval(() => {
        const now = new Date().getTime();
        const diff = end - now;

        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
        const seconds = Math.floor((diff % (1000*60)) / 1000);

        document.getElementById("countdown").innerHTML = `
          <div class="text-center"><div class="text-6xl">${days}</div><div class="text-xs tracking-widest">DAYS</div></div>
          <div class="text-center"><div class="text-6xl">${hours}</div><div class="text-xs tracking-widest">HOURS</div></div>
          <div class="text-center"><div class="text-6xl">${minutes}</div><div class="text-xs tracking-widest">MIN</div></div>
          <div class="text-center"><div class="text-6xl">${seconds}</div><div class="text-xs tracking-widest">SEC</div></div>
        `;
      }, 1000);
    }
    startCountdown();
  </script>
</body>
</html>
